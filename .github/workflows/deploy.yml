name: Deploy Next.js Site to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install pnpm (This is the crucial new step!)
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 # Installs a stable version of pnpm

      # 3. Setup Node.js and cache pnpm dependencies to speed up future builds
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm' 

      # 4. Install dependencies using pnpm 
      # (--frozen-lockfile is pnpm's equivalent of npm ci. It ensures exact versions are installed)
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 5. Build the static export
      - name: Build Next.js App
        run: pnpm run build

      # 6. Upload the 'out' folder to cPanel via FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: ./