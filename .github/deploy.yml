name: Deploy Next.js Site to cPanel

# This tells GitHub to run the script whenever you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can change this if you use a specific Node version

      # 3. Install your project dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Build the static export (creates the 'out' folder)
      - name: Build Next.js App
        run: npm run build

      # 5. Upload the 'out' folder to cPanel via FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # This ensures it deletes old files on the server that no longer exist in your code
          server-dir: ./